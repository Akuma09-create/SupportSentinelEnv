version: '3.8'

services:
  api:
    build: .
    container_name: support-sentinel-env
    ports:
      - "7860:7860"
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://api:7860
    volumes:
      - ./customer-support-env:/app/customer-support-env
      - ./server:/app/server
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7860/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - support-network

networks:
  support-network:
    driver: bridge
